<nav class="navbar">
  <div class="nav-inner">
    <a routerLink="/" class="logo">
      <img src="/logo.png" alt="CartCore Logo">
      <span>CART<span class="logo-accent">CORE</span></span>
    </a>

    <div class="menu-overlay" [class.open]="menuOpen" (click)="menuOpen=false"></div>
    <div class="nav-links" [class.open]="menuOpen">
      <!-- Close button on mobile side menu -->
      <button class="menu-close-btn" (click)="menuOpen=false">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>

      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="menuOpen=false">{{ t('HOME') }}</a>
      <a routerLink="/products" routerLinkActive="active" (click)="menuOpen=false">{{ t('SHOP') }}</a>

      @if (user()) {
        <a routerLink="/cart" routerLinkActive="active" (click)="menuOpen=false">{{ t('CART') }}</a>
        <a routerLink="/wishlist" routerLinkActive="active" (click)="menuOpen=false">{{ t('WISHLIST') }}</a>
        <a routerLink="/orders" routerLinkActive="active" (click)="menuOpen=false">{{ t('ORDERS') }}</a>
        @if (isAdmin()) {
          <a routerLink="/admin" routerLinkActive="active" (click)="menuOpen=false" class="admin-link">{{ t('ADMIN') }}</a>
        }
        <div class="user-profile">
          <span class="user-name">{{ user()?.name }}</span>
        </div>
        <a routerLink="/logout" class="btn-logout" (click)="menuOpen=false">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span>{{ t('LOGOUT') }}</span>
        </a>
      } @else {
        <a routerLink="/login" class="nav-btn" routerLinkActive="active" (click)="menuOpen=false">{{ t('LOGIN') }}</a>
        <a routerLink="/register" class="nav-btn-reg" routerLinkActive="active" (click)="menuOpen=false">{{ t('SIGNUP') }}</a>
      }

      <div class="nav-settings">
        <!-- Language Dropdown -->
        <div class="lang-dropdown-wrapper">
          <button class="lang-btn" (click)="isLangDropdownOpen = !isLangDropdownOpen">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            {{ langService.currentLang() === 'en' ? 'EN' : 'GE' }}
          </button>
          <div class="lang-menu" *ngIf="isLangDropdownOpen">
            <button (click)="setLang('en')">English</button>
            <button (click)="setLang('ge')">ქართული</button>
          </div>
        </div>
        
        <!-- Theme Toggle (Always visible) -->
        <button class="theme-toggle" (click)="toggleTheme()" aria-label="Toggle Theme">
          <svg *ngIf="!themeService.isDarkMode()" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg *ngIf="themeService.isDarkMode()" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>

    <button class="hamburger" (click)="menuOpen = !menuOpen" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
